<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Parkmatrix Admin Dashboard</title>

<style>
:root {
    --bg: #0b0f14;
    --card: #161b22;
    --border: #30363d;
    --text: #ffffff;
    --sub: #8b949e;
    --green: #2ea043;
    --red: #da3633;
    --blue: #1d56e2;
}

body {
    margin: 0;
    padding: 30px;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
}

.container {
    max-width: 1200px;
    margin: auto;
}

h1 {
    margin-bottom: 30px;
}

/* ===== STATS ===== */

.stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 10px;
}

.card h3 {
    margin: 0;
    font-size: 0.9rem;
    color: var(--sub);
}

.card .value {
    font-size: 2rem;
    margin-top: 10px;
    font-weight: bold;
}

.green { color: var(--green); }
.red { color: var(--red); }
.blue { color: var(--blue); }

/* ===== GRID ===== */

.grid-section {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 25px;
    border-radius: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 12px;
    margin-top: 20px;
}

.slot {
    height: 75px;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 0.8rem;
    cursor: pointer;
    transition: 0.2s;
}

.available {
    background: rgba(46,160,67,0.1);
    border: 1px solid var(--green);
    color: var(--green);
}

.occupied {
    background: rgba(218,54,51,0.1);
    border: 1px solid var(--red);
    color: var(--red);
}

.slot:hover {
    transform: scale(1.05);
}

/* ===== ACTIVITY ===== */

.activity {
    margin-top: 30px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 20px;
    border-radius: 10px;
}

.activity-list {
    max-height: 250px;
    overflow-y: auto;
    margin-top: 15px;
}

.activity-item {
    padding: 10px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
}
</style>

</head>
<body>

<div class="container">
    <h1>Admin Dashboard</h1>

    <div class="stats">
        <div class="card">
            <h3>Total Slots</h3>
            <div class="value blue" id="totalSlots"></div>
        </div>

        <div class="card">
            <h3>Occupied</h3>
            <div class="value red" id="occupiedSlots"></div>
        </div>

        <div class="card">
            <h3>Available</h3>
            <div class="value green" id="availableSlots"></div>
        </div>

        <div class="card">
            <h3>Today's Revenue</h3>
            <div class="value blue" id="revenue"></div>
        </div>
    </div>

    <div class="grid-section">
        <h2>Parking Slots</h2>
        <div class="grid" id="grid"></div>
    </div>

    <div class="activity">
        <h2>Recent Activity</h2>
        <div class="activity-list" id="activityList"></div>
    </div>
    <iframe 
        title="Parkmatrix Dashboard"
        width="100%" 
        height="650"
        src="https://app.powerbi.com/view?r=eyJrIjoiOWMwODIyOWYtYWIyZS00YmY0LWJkMzQtNmMyMmFmMmUxMTU3IiwidCI6IjI3NzU4NjEyLTZhZjMtNDk2Yi05YjIwLWZiYWE3MWNiMmFhMCJ9"
        frameborder="0"
        allowFullScreen="true">
    </iframe>

</div>

<script>
const TOTAL_SLOTS = 50;
let slots = [];
let revenue = 0;

function init() {
    for (let i = 1; i <= TOTAL_SLOTS; i++) {
        slots.push({
            id: "A-" + String(i).padStart(3, "0"),
            status: Math.random() > 0.6 ? "occupied" : "available"
        });
    }
    render();
}

function render() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    let occupiedCount = 0;

    slots.forEach(slot => {
        const div = document.createElement("div");
        div.className = "slot " + slot.status;
        div.innerText = slot.id;

        if (slot.status === "occupied") {
            occupiedCount++;
        }

        div.onclick = () => toggleSlot(slot);

        grid.appendChild(div);
    });

    document.getElementById("totalSlots").innerText = TOTAL_SLOTS;
    document.getElementById("occupiedSlots").innerText = occupiedCount;
    document.getElementById("availableSlots").innerText = TOTAL_SLOTS - occupiedCount;
    document.getElementById("revenue").innerText = "₹" + revenue;
}

function toggleSlot(slot) {
    if (slot.status === "available") {
        slot.status = "occupied";
        revenue += 50;
        addActivity("Vehicle parked at " + slot.id);
    } else {
        slot.status = "available";
        addActivity("Vehicle exited from " + slot.id);
    }
    render();
}

function addActivity(text) {
    const list = document.getElementById("activityList");
    const item = document.createElement("div");
    item.className = "activity-item";
    item.innerText = new Date().toLocaleTimeString() + " - " + text;
    list.prepend(item);
}

init();
</script>

</body>
</html>
